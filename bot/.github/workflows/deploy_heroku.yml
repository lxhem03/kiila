name: Deploy to Heroku - Single App

on:
  workflow_dispatch:
    inputs:
      HEROKU_APP_NAME:
        description: Heroku App name (must already exist)
        required: true
      HEROKU_API_KEY:
        description: Heroku API key
        required: true
      HEROKU_EMAIL:
        description: Heroku email address
        required: true
      confirm:
        description: Type YES to start deployment
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clean unnecessary files
        run: |
          for file in README.md wzv3_hk_deploy.ipynb; do
            [ -f "$file" ] && echo "Deleting: $file" && rm -f "$file" || echo "Not found: $file"
          done

      - name: Install Heroku CLI
        run: |
          curl https://cli-assets.heroku.com/install.sh | sh

      - name: Force set container stack
        env:
          HEROKU_API_KEY: ${{ inputs.HEROKU_API_KEY }}
          HEROKU_APP_NAME: ${{ inputs.HEROKU_APP_NAME }}
        run: |
          curl -X PATCH https://api.heroku.com/apps/$HEROKU_APP_NAME \
            -H "Content-Type: application/json" \
            -H "Accept: application/vnd.heroku+json; version=3" \
            -H "Authorization: Bearer $HEROKU_API_KEY" \
            -d '{"build_stack": "container"}' || echo "Stack already set or update failed"

      - name: Deploy Docker image to Heroku
        uses: akhileshns/heroku-deploy@v3.13.15
        with:
          heroku_api_key:   ${{ inputs.HEROKU_API_KEY }}
          heroku_app_name:  ${{ inputs.HEROKU_APP_NAME }}
          heroku_email:     ${{ inputs.HEROKU_EMAIL }}
          usedocker:        true
          docker_heroku_process_type: worker
          stack:            container
          region:           eu
          dontautocreate:   true

      - name: Check confirmation
        if: github.event.inputs.confirm != 'YES'
        run: |
          echo "Deployment cancelled - must type YES"
          exit 1
